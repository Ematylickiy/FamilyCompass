services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: familycompass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d familycompass']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - '5432:5432'

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=familycompass;Username=postgres;Password=postgres
      ASPNETCORE_URLS: http://0.0.0.0:8080
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '8080'

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  pgdata:
